<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RETRO DICE 90s - Черно-серый стиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', 'Monaco', monospace;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Ретро-полоски 90-х (движущиеся, черно-серые) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    rgba(80, 80, 80, 0.3) 0px,
                    rgba(80, 80, 80, 0.3) 2px,
                    transparent 2px,
                    transparent 8px,
                    rgba(50, 50, 50, 0.2) 8px,
                    rgba(50, 50, 50, 0.2) 10px,
                    transparent 10px,
                    transparent 20px
                ),
                repeating-linear-gradient(
                    0deg,
                    rgba(100, 100, 100, 0.15) 0px,
                    rgba(100, 100, 100, 0.15) 1px,
                    transparent 1px,
                    transparent 4px
                );
            animation: stripesMove 15s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes stripesMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        /* Мультяшный контейнер */
        .game-container {
            max-width: 600px;
            width: 100%;
            background: #2a2a2a;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px;
            position: relative;
            z-index: 2;
            border: 4px solid #4a4a4a;
            animation: borderPulse 2s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: #4a4a4a; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
            50% { border-color: #6a6a6a; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        }

        /* Мультяшный контент */
        .game-content {
            background: linear-gradient(135deg, #1f1f1f 0%, #151515 100%);
            border-radius: 30px;
            padding: 25px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Счетчик денег (черно-серый) */
        .money-counter {
            background: #000000cc;
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 12px 20px;
            text-align: center;
            margin-bottom: 25px;
            border: 2px solid #5a5a5a;
            box-shadow: 0 5px 0 #2a2a2a;
            transition: transform 0.1s ease;
        }

        .money-label {
            font-size: 14px;
            letter-spacing: 3px;
            color: #aaa;
            text-transform: uppercase;
            font-weight: bold;
        }

        .money-amount {
            font-size: 42px;
            font-weight: bold;
            color: #e0e0e0;
            text-shadow: 0 0 5px #888;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        /* Кубик 3D стиль */
        .dice-area {
            text-align: center;
            margin: 20px 0;
            perspective: 800px;
        }

        .dice {
            width: 140px;
            height: 140px;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .dice-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #f5f5f5 0%, #dddddd 100%);
            border-radius: 20px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.8), 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            color: #333;
            border: 3px solid #aaa;
        }

        /* Позиционирование граней куба */
        .dice-face-1 { transform: translateZ(70px); }
        .dice-face-2 { transform: rotateY(180deg) translateZ(70px); }
        .dice-face-3 { transform: rotateY(90deg) translateZ(70px); }
        .dice-face-4 { transform: rotateY(-90deg) translateZ(70px); }
        .dice-face-5 { transform: rotateX(90deg) translateZ(70px); }
        .dice-face-6 { transform: rotateX(-90deg) translateZ(70px); }

        /* Точки на кубике */
        .dot {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #222;
            border-radius: 50%;
            box-shadow: inset -2px -2px 2px rgba(0,0,0,0.3), 1px 1px 1px rgba(255,255,255,0.5);
        }

        /* Расположение точек для каждой грани */
        .face {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .dice-face-1 .face, .dice-face-2 .face, .dice-face-3 .face, 
        .dice-face-4 .face, .dice-face-5 .face, .dice-face-6 .face {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Анимация вращения */
        .rolling-3d {
            animation: roll3d 0.6s cubic-bezier(0.4, 0, 0.2, 1) 2;
        }

        @keyframes roll3d {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            25% { transform: rotateX(360deg) rotateY(180deg); }
            50% { transform: rotateX(720deg) rotateY(360deg); }
            75% { transform: rotateX(540deg) rotateY(540deg); }
            100% { transform: rotateX(720deg) rotateY(720deg); }
        }

        /* Таймер обратного отсчета */
        .timer-box {
            background: #000000aa;
            border-radius: 50px;
            padding: 8px 15px;
            margin: 15px auto;
            text-align: center;
            display: inline-block;
            width: auto;
            border: 1px solid #5a5a5a;
        }

        .timer-text {
            font-size: 24px;
            font-weight: bold;
            color: #ddd;
            font-family: monospace;
        }

        /* Ставки фишками */
        .bets-section {
            margin: 25px 0;
        }

        .bets-title {
            text-align: center;
            color: #bbb;
            font-size: 16px;
            letter-spacing: 3px;
            margin-bottom: 15px;
            border-bottom: 2px dotted #5a5a5a;
            display: inline-block;
            width: 100%;
            text-transform: uppercase;
        }

        .bets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .bet-chip {
            background: radial-gradient(circle at 30% 30%, #6a6a6a, #3a3a3a);
            border: none;
            border-radius: 20px;
            padding: 12px 0;
            font-weight: bold;
            font-size: 22px;
            color: #f0f0f0;
            text-shadow: 0 1px 0 #1a1a1a;
            box-shadow: 0 6px 0 #2a2a2a;
            cursor: pointer;
            transition: 0.07s linear;
            font-family: 'Courier New', monospace;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .bet-chip:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a2a2a;
        }

        .bet-chip.disabled {
            opacity: 0.5;
            transform: translateY(0);
            cursor: not-allowed;
        }

        .bet-chip small {
            display: block;
            font-size: 11px;
            color: #ccc;
        }

        /* История */
        .history-box {
            background: #0a0a0acc;
            border-radius: 20px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #5a5a5a;
        }

        .history-title {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 60px;
            align-items: center;
        }

        .history-item {
            background: #2a2a2a;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: inset 0 0 0 1px #6a6a6a, 0 3px 5px black;
            font-size: 32px;
            font-weight: bold;
            color: #ddd;
        }

        .result-message {
            background: #000000bb;
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
            font-weight: bold;
            border-left: 4px solid #6a6a6a;
            border-right: 4px solid #6a6a6a;
        }

        .info {
            font-size: 11px;
            text-align: center;
            margin-top: 15px;
            color: #8a8a8a;
        }

        .bet-status {
            text-align: center;
            margin: 10px 0;
            font-size: 13px;
            color: #ffaa66;
        }

        button {
            background: none;
            border: none;
        }

        .flex-center {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-content">
        <div class="money-counter">
            <div class="money-label">💰 БЕСКОНЕЧНЫЙ БАНК 💰</div>
            <div class="money-amount" id="balanceDisplay">1,000,000</div>
        </div>

        <!-- 3D Кубик -->
        <div class="dice-area">
            <div class="dice" id="dice3d">
                <div class="dice-face dice-face-1">
                    <div class="face" id="face1"></div>
                </div>
                <div class="dice-face dice-face-2">
                    <div class="face" id="face2"></div>
                </div>
                <div class="dice-face dice-face-3">
                    <div class="face" id="face3"></div>
                </div>
                <div class="dice-face dice-face-4">
                    <div class="face" id="face4"></div>
                </div>
                <div class="dice-face dice-face-5">
                    <div class="face" id="face5"></div>
                </div>
                <div class="dice-face dice-face-6">
                    <div class="face" id="face6"></div>
                </div>
            </div>
        </div>

        <!-- Таймер -->
        <div class="flex-center">
            <div class="timer-box">
                <div class="timer-text" id="timerDisplay">⚡ Жду ставку ⚡</div>
            </div>
        </div>

        <div class="bet-status" id="betStatus">🎲 Выберите ставку 🎲</div>

        <div class="bets-section">
            <div class="bets-title">🎲 СТАВКИ ФИШКАМИ 🎲</div>
            <div class="bets-grid">
                <button class="bet-chip" data-bet="even">ЧЁТ <br><small>x2</small></button>
                <button class="bet-chip" data-bet="odd">НЕЧЁТ <br><small>x2</small></button>
                <button class="bet-chip" data-bet="1">⚀ 1 <br><small>x3.5</small></button>
                <button class="bet-chip" data-bet="2">⚁ 2 <br><small>x3.5</small></button>
                <button class="bet-chip" data-bet="3">⚂ 3 <br><small>x3.5</small></button>
                <button class="bet-chip" data-bet="4">⚃ 4 <br><small>x3.5</small></button>
                <button class="bet-chip" data-bet="5">⚄ 5 <br><small>x3.5</small></button>
                <button class="bet-chip" data-bet="6">⚅ 6 <br><small>x3.5</small></button>
            </div>
        </div>

        <div class="history-box">
            <div class="history-title">📜 ИСТОРИЯ ВЫПАДЕНИЙ</div>
            <div class="history-list" id="historyList">
                <div style="color:#6a6a6a; font-size:14px;">—</div>
            </div>
        </div>
        <div class="result-message" id="resultMessage">🎲 Сделайте ставку! Бросок через 5 секунд 🎲</div>
        <div class="info">⭐ ЧЁТ/НЕЧЁТ x2 | ЦИФРА x3.5 | БЕСКОНЕЧНЫЙ БАНК ⭐</div>
    </div>
</div>

<script>
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    let balance = 1000000;      // бесконечный банк
    const stakeValue = 100;     // ставка фишками
    let currentBet = null;      // текущая ставка (even, odd, 1-6)
    let timerInterval = null;
    let countdown = 0;
    let isRolling = false;
    let canPlaceBet = true;      // можно ли делать ставку
    let historyNumbers = [];

    // Элементы DOM
    const balanceDisplay = document.getElementById('balanceDisplay');
    const historyListEl = document.getElementById('historyList');
    const resultMsg = document.getElementById('resultMessage');
    const timerDisplay = document.getElementById('timerDisplay');
    const betStatus = document.getElementById('betStatus');
    const dice3d = document.getElementById('dice3d');
    const betChips = document.querySelectorAll('.bet-chip');

    // Коэффициенты
    const multipliers = {
        'even': 2, 'odd': 2,
        '1': 3.5, '2': 3.5, '3': 3.5,
        '4': 3.5, '5': 3.5, '6': 3.5
    };

    // ========== РИСОВАНИЕ ТОЧЕК НА КУБИКЕ ==========
    function drawDiceDots() {
        // Для каждой грани рисуем точки в зависимости от числа
        const dotConfigs = {
            1: [[50, 50]],
            2: [[25, 25], [75, 75]],
            3: [[25, 25], [50, 50], [75, 75]],
            4: [[25, 25], [25, 75], [75, 25], [75, 75]],
            5: [[25, 25], [25, 75], [50, 50], [75, 25], [75, 75]],
            6: [[25, 25], [25, 50], [25, 75], [75, 25], [75, 50], [75, 75]]
        };

        for (let val = 1; val <= 6; val++) {
            const faceDiv = document.getElementById(`face${val}`);
            if (!faceDiv) continue;
            faceDiv.innerHTML = '';
            faceDiv.style.position = 'relative';
            faceDiv.style.width = '100%';
            faceDiv.style.height = '100%';
            
            const dots = dotConfigs[val];
            dots.forEach(pos => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.position = 'absolute';
                dot.style.left = `${pos[0] - 9}%`;
                dot.style.top = `${pos[1] - 9}%`;
                dot.style.width = '18px';
                dot.style.height = '18px';
                dot.style.background = '#1a1a1a';
                dot.style.borderRadius = '50%';
                dot.style.boxShadow = 'inset -2px -2px 2px rgba(0,0,0,0.3), 1px 1px 1px rgba(255,255,255,0.5)';
                faceDiv.appendChild(dot);
            });
        }
    }

    // ========== АНИМАЦИЯ КУБИКА ==========
    async function animateDiceRoll() {
        if (isRolling) return;
        isRolling = true;
        
        dice3d.classList.add('rolling-3d');
        
        await new Promise(resolve => setTimeout(resolve, 600));
        
        dice3d.classList.remove('rolling-3d');
        
        // Генерируем случайное число
        const finalValue = Math.floor(Math.random() * 6) + 1;
        
        // Поворачиваем кубик так, чтобы нужная грань была спереди
        rotateDiceToValue(finalValue);
        
        await new Promise(resolve => setTimeout(resolve, 100));
        isRolling = false;
        return finalValue;
    }

    // Поворот кубика к нужному значению
    function rotateDiceToValue(value) {
        // Вращаем кубик так, чтобы грань с нужным числом оказалась спереди
        const rotations = {
            1: 'rotateX(0deg) rotateY(0deg)',
            2: 'rotateY(180deg)',
            3: 'rotateY(90deg)',
            4: 'rotateY(-90deg)',
            5: 'rotateX(90deg)',
            6: 'rotateX(-90deg)'
        };
        dice3d.style.transform = rotations[value] || rotations[1];
    }

    // ========== ИСТОРИЯ ==========
    function addToHistory(value) {
        historyNumbers.unshift(value);
        if (historyNumbers.length > 10) historyNumbers.pop();
        renderHistory();
    }

    function renderHistory() {
        if (historyNumbers.length === 0) {
            historyListEl.innerHTML = '<div style="color:#6a6a6a; font-size:14px;">—</div>';
            return;
        }
        const diceSymbols = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
        historyListEl.innerHTML = historyNumbers.map(num => 
            `<div class="history-item">${diceSymbols[num]}</div>`
        ).join('');
    }

    // ========== ОБНОВЛЕНИЕ БАЛАНСА ==========
    function updateBalanceUI() {
        balanceDisplay.innerText = Math.floor(balance).toLocaleString();
    }

    // ========== БРОСОК ПО СТАВКЕ ==========
    async function executeRoll() {
        if (isRolling || !currentBet) {
            return;
        }
        
        canPlaceBet = false;
        
        // Блокируем кнопки ставок
        betChips.forEach(btn => btn.classList.add('disabled'));
        
        // Анимация кубика
        const rolledValue = await animateDiceRoll();
        addToHistory(rolledValue);
        
        // Проверка выигрыша
        let win = false;
        const multiplier = multipliers[currentBet];
        
        if (currentBet === 'even') {
            win = (rolledValue % 2 === 0);
        } else if (currentBet === 'odd') {
            win = (rolledValue % 2 !== 0);
        } else {
            const betNum = parseInt(currentBet);
            win = (rolledValue === betNum);
        }
        
        const diceSymbols = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
        
        if (win) {
            const winAmount = stakeValue * multiplier;
            balance += winAmount;
            updateBalanceUI();
            resultMsg.innerHTML = `🎉 ВЫИГРЫШ! Выпало ${rolledValue} ${diceSymbols[rolledValue]}! +${winAmount.toFixed(0)}💰`;
            betStatus.innerHTML = `✅ ВЫИГРЫШ x${multiplier}! Сделайте новую ставку ✅`;
        } else {
            // Проигрыш без списания баланса (бесконечные деньги)
            resultMsg.innerHTML = `😵 ПРОИГРЫШ. Выпало ${rolledValue} ${diceSymbols[rolledValue]}. Ставка на ${currentBet === 'even' ? 'ЧЁТ' : currentBet === 'odd' ? 'НЕЧЁТ' : `цифру ${currentBet}`} не сыграла.`;
            betStatus.innerHTML = `❌ ПРОИГРЫШ! Попробуйте снова! ❌`;
        }
        
        // Сброс ставки
        currentBet = null;
        
        // Разблокируем ставки
        betChips.forEach(btn => btn.classList.remove('disabled'));
        canPlaceBet = true;
        
        // Останавливаем таймер
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        timerDisplay.innerHTML = '⚡ Жду ставку ⚡';
    }

    // ========== ЗАПУСК ТАЙМЕРА ==========
    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        
        let remaining = seconds;
        timerDisplay.innerHTML = `${remaining} сек...`;
        
        timerInterval = setInterval(() => {
            remaining--;
            timerDisplay.innerHTML = `${remaining} сек...`;
            
            if (remaining <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                if (currentBet && canPlaceBet && !isRolling) {
                    executeRoll();
                } else if (!currentBet) {
                    timerDisplay.innerHTML = '⚡ Нет ставки ⚡';
                    betStatus.innerHTML = '🎲 Сделайте ставку, чтобы начать отсчет 🎲';
                }
            }
        }, 1000);
    }

    // ========== ОБРАБОТКА СТАВКИ ==========
    function placeBet(betType) {
        if (!canPlaceBet) {
            resultMsg.innerHTML = '⏳ Подождите, идет бросок или таймер...';
            return;
        }
        
        if (isRolling) {
            resultMsg.innerHTML = '🎲 Кубик крутится, подождите...';
            return;
        }
        
        // Устанавливаем ставку
        currentBet = betType;
        
        let betName = '';
        if (betType === 'even') betName = 'ЧЁТ (x2)';
        else if (betType === 'odd') betName = 'НЕЧЁТ (x2)';
        else betName = `ЦИФРА ${betType} (x3.5)`;
        
        betStatus.innerHTML = `🎯 СТАВКА: ${betName} | Бросок через 5 секунд 🎯`;
        resultMsg.innerHTML = `✅ Ставка принята на ${betName}. Ждите броска...`;
        
        // Запускаем таймер 5 секунд
        startTimer(5);
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        drawDiceDots();
        // Начальное положение кубика - грань 1
        dice3d.style.transform = 'rotateX(0deg) rotateY(0deg)';
        updateBalanceUI();
        
        // Навешиваем обработчики на кнопки ставок
        betChips.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const betType = btn.getAttribute('data-bet');
                placeBet(betType);
            });
        });
        
        // Для красоты добавляем случайный бросок в историю
        historyNumbers = [];
        renderHistory();
        
        resultMsg.innerHTML = '🎲 Сделайте ставку! Бросок через 5 секунд 🎲';
    }
    
    init();
</script>
</body>
</html>
