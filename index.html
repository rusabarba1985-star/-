<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Русская Рулетка - Dice Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a472a 0%, #0a1f12 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Monaco', monospace;
            padding: 20px;
        }

        /* Основной контейнер - стиль русской рулетки */
        .game-container {
            max-width: 550px;
            width: 100%;
            background: linear-gradient(145deg, #2c2b1f 0%, #1e1d15 100%);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px;
            border: 3px solid #b87c4f;
            position: relative;
            overflow: hidden;
        }

        /* Ретро-полоски (движущиеся) */
        .game-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: repeating-linear-gradient(
                45deg,
                rgba(180, 50, 50, 0.15) 0px,
                rgba(180, 50, 50, 0.15) 3px,
                transparent 3px,
                transparent 12px,
                rgba(200, 180, 60, 0.1) 12px,
                rgba(200, 180, 60, 0.1) 15px,
                transparent 15px,
                transparent 24px
            );
            animation: stripeMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes stripeMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        /* Винтажный кожаный эффект */
        .game-content {
            position: relative;
            z-index: 2;
            background: rgba(30, 27, 20, 0.7);
            border-radius: 40px;
            backdrop-filter: blur(3px);
            padding: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.3);
        }

        /* Счетчик денег */
        .money-counter {
            background: #000000aa;
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 12px 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #ffd966;
            box-shadow: 0 0 10px rgba(255,200,0,0.3);
        }

        .money-label {
            font-size: 14px;
            letter-spacing: 2px;
            color: #d4af37;
            text-transform: uppercase;
            font-weight: bold;
        }

        .money-amount {
            font-size: 36px;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 5px #ff6600;
            font-family: monospace;
        }

        /* Кубик */
        .dice-area {
            text-align: center;
            margin: 15px 0;
        }

        .dice {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            background: #f0f0f0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            font-weight: bold;
            box-shadow: 0 10px 0 #9b6a3c, inset 0 1px 4px white;
            transition: all 0.1s ease;
            background: linear-gradient(145deg, #fff, #e0e0e0);
            color: #2c3e2f;
            font-family: monospace;
            position: relative;
        }

        .rolling {
            animation: rollShake 0.4s cubic-bezier(0.4, 0, 0.2, 1) 3;
        }

        @keyframes rollShake {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(15deg) scale(1.1); }
            50% { transform: rotate(-15deg) scale(1.1); }
            75% { transform: rotate(8deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* Ставки фишками */
        .bets-section {
            margin: 20px 0;
        }

        .bets-title {
            text-align: center;
            color: #e6c87c;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 12px;
            border-bottom: 1px dashed #b87c4f;
            display: inline-block;
            width: 100%;
        }

        .bets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .bet-chip {
            background: radial-gradient(circle at 30% 30%, #ffd966, #b87c2e);
            border: none;
            border-radius: 60px;
            padding: 12px 0;
            font-weight: bold;
            font-size: 20px;
            color: #1e2a1c;
            text-shadow: 0 1px 0 rgba(255,255,200,0.8);
            box-shadow: 0 5px 0 #6b3e1a;
            cursor: pointer;
            transition: 0.07s linear;
            font-family: monospace;
            font-weight: 800;
        }

        .bet-chip:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6b3e1a;
        }

        .bet-chip.special {
            background: radial-gradient(circle at 30% 30%, #c0c0c0, #7a5a3a);
        }

        /* Коэффициенты */
        .bet-chip small {
            display: block;
            font-size: 11px;
            color: #1f2c0e;
        }

        /* История */
        .history-box {
            background: #0f0e0aaa;
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ab8e54;
        }

        .history-title {
            font-size: 12px;
            color: #dbb85c;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 45px;
            font-size: 28px;
            font-weight: bold;
            align-items: center;
        }

        .history-item {
            background: #2f2a1f;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: inset 0 0 0 1px #dbb85c33, 0 2px 4px black;
            font-size: 28px;
        }

        /* сообщение результата */
        .result-message {
            background: #00000099;
            border-radius: 30px;
            padding: 8px;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: #ffdd99;
            font-weight: bold;
            transition: 0.2s;
        }

        .info {
            font-size: 11px;
            text-align: center;
            margin-top: 12px;
            color: #bd9a5a;
        }

        button {
            background: none;
            border: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-content">
        <!-- БЕСКОНЕЧНЫЕ ДЕНЬГИ: просто огромный баланс, который не убывает -->
        <div class="money-counter">
            <div class="money-label">💰 ВАШ БАНК 💰</div>
            <div class="money-amount" id="balanceDisplay">10,000</div>
        </div>

        <!-- Кубик с анимацией -->
        <div class="dice-area">
            <div class="dice" id="diceElement">🎲</div>
        </div>

        <!-- Ставки: чет/нечет + числа 1-6 -->
        <div class="bets-section">
            <div class="bets-title">🎲 СТАВКИ ФИШКАМИ 🎲</div>
            <div class="bets-grid">
                <button class="bet-chip" data-bet="even">ЧЁТ <br><small>x2</small></button>
                <button class="bet-chip" data-bet="odd">НЕЧЁТ <br><small>x2</small></button>
                <button class="bet-chip special" data-bet="1">1 <br><small>x3.5</small></button>
                <button class="bet-chip special" data-bet="2">2 <br><small>x3.5</small></button>
                <button class="bet-chip special" data-bet="3">3 <br><small>x3.5</small></button>
                <button class="bet-chip special" data-bet="4">4 <br><small>x3.5</small></button>
                <button class="bet-chip special" data-bet="5">5 <br><small>x3.5</small></button>
                <button class="bet-chip special" data-bet="6">6 <br><small>x3.5</small></button>
            </div>
        </div>

        <!-- История выпавших чисел -->
        <div class="history-box">
            <div class="history-title">📜 ИСТОРИЯ ВЫПАДЕНИЙ</div>
            <div class="history-list" id="historyList">
                <div style="color:#b87c4f; font-size:14px;">—</div>
            </div>
        </div>
        <div class="result-message" id="resultMessage">⚡ Сделайте ставку! Кубик падает каждые 10 сек ⚡</div>
        <div class="info">⚡ Чёт/Нечет x2 | Цифра x3.5 | Выигрыш начисляется бесконечно ⚡</div>
    </div>
</div>

<script>
    // ------ БЕСКОНЕЧНЫЕ ДЕНЬГИ ------
    // Баланс всегда огромный и при выигрышах увеличивается, но не тратится по факту
    // Чтобы имитировать "бесконечные деньги", мы даём стартовый баланс 1_000_000_000,
    // но игрок может ставить любую сумму, проигрыши не отнимают реально (игра казино не забирает фишки)
    // Однако по условию: "бесконечно денег" значит баланс не уходит в минус, можно ставить бесконечно.
    // Сделаем так: баланс всегда ≥ 1_000_000, и при ставке он не уменьшается, но выигрыш зачисляется!
    // Но для реализма: пусть отображается баланс, который только растёт. Ставки условные, но выигрыши прибавляются.
    
    let balance = 1000000;   // бесконечный запас
    let currentBetValue = 100;   // фиксированная ставка "фишками" = 100
    let lastRoll = null;
    let rollTimeout = null;
    let isRolling = false;

    // История (макс 10 записей)
    let historyNumbers = [];

    // Элементы DOM
    const diceEl = document.getElementById('diceElement');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const historyList = document.getElementById('historyList');
    const resultMsg = document.getElementById('resultMessage');

    // Коэффициенты
    const multipliers = {
        'even': 2,
        'odd': 2,
        '1': 3.5,
        '2': 3.5,
        '3': 3.5,
        '4': 3.5,
        '5': 3.5,
        '6': 3.5
    };

    // Функция обновления UI баланса
    function updateBalanceUI() {
        balanceDisplay.innerText = Math.floor(balance).toLocaleString();
    }

    // Добавление в историю
    function addToHistory(rollValue) {
        historyNumbers.unshift(rollValue);
        if (historyNumbers.length > 10) historyNumbers.pop();
        renderHistory();
    }

    function renderHistory() {
        if (historyNumbers.length === 0) {
            historyList.innerHTML = '<div style="color:#b87c4f; font-size:14px;">—</div>';
            return;
        }
        historyList.innerHTML = historyNumbers.map(num => {
            let symbol = '';
            if (num === 1) symbol = '⚀';
            else if (num === 2) symbol = '⚁';
            else if (num === 3) symbol = '⚂';
            else if (num === 4) symbol = '⚃';
            else if (num === 5) symbol = '⚄';
            else if (num === 6) symbol = '⚅';
            return `<div class="history-item">${symbol}</div>`;
        }).join('');
    }

    // Анимация кубика + генерация случайного числа от 1 до 6
    async function rollDiceWithAnimation() {
        if (isRolling) return;
        isRolling = true;
        
        // анимация тряски
        diceEl.classList.add('rolling');
        
        // Имитация вращения: меняем символы несколько раз
        const rollInterval = setInterval(() => {
            const fake = Math.floor(Math.random() * 6) + 1;
            diceEl.innerText = getDiceSymbol(fake);
        }, 80);
        
        // Длительность анимации ~0.5 сек
        await new Promise(resolve => setTimeout(resolve, 500));
        clearInterval(rollInterval);
        
        // Финальное случайное значение
        const finalValue = Math.floor(Math.random() * 6) + 1;
        diceEl.innerText = getDiceSymbol(finalValue);
        diceEl.classList.remove('rolling');
        
        lastRoll = finalValue;
        addToHistory(finalValue);
        isRolling = false;
        return finalValue;
    }
    
    function getDiceSymbol(val) {
        const map = {1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅'};
        return map[val] || '🎲';
    }

    // Обработка ставки (по клику на фишку)
    async function placeBet(betType) {
        if (isRolling) {
            resultMsg.innerText = '⏳ Подождите, кубик уже крутится...';
            return;
        }
        
        // Ставка делается на основе текущего броска, но у нас кубик выпадет по расписанию? 
        // По условию: "кубик каждые 10 секунд подкидывается и была анимация". 
        // Однако также нужно по клику на ставку сразу делать бросок? В ретро-игре обычно: 
        // выбрал ставку -> бросил кубик.
        // Для удобства: нажатие на любую ставку немедленно запускает бросок (если не идёт таймер)
        // и по результату начисляет выигрыш по коэффициенту. При этом авто-бросок каждые 10 секунд тоже работает.
        
        // Отменяем предыдущий авто-бросок, чтобы не было коллизий
        if (rollTimeout) {
            clearTimeout(rollTimeout);
            rollTimeout = null;
        }
        
        // Запускаем анимацию и получаем число
        const rolled = await rollDiceWithAnimation();
        
        // Определяем, выиграл ли игрок
        let win = false;
        let multiplier = multipliers[betType];
        
        if (betType === 'even') {
            win = (rolled % 2 === 0);
        } else if (betType === 'odd') {
            win = (rolled % 2 !== 0);
        } else {
            // конкретная цифра 1..6
            const betNumber = parseInt(betType);
            win = (rolled === betNumber);
        }
        
        // СТАВКА ФИШКАМИ: сумма ставки всегда 100 (условная фишка)
        const stake = currentBetValue;
        
        if (win) {
            const winAmount = stake * multiplier;
            // БЕСКОНЕЧНЫЕ ДЕНЬГИ: баланс только растёт, ставка не вычитается
            balance += winAmount;
            updateBalanceUI();
            resultMsg.innerHTML = `🎲 ВЫИГРЫШ! Выпало ${rolled} (${getDiceSymbol(rolled)}). Ставка ${stake}💰 x${multiplier} = +${winAmount.toFixed(0)}💰`;
        } else {
            // Проигрыш: по условию "бесконечно денег" — баланс не уменьшаем, просто сообщаем
            // Чтобы игра была честной и интересной, проигрыш не тратит фишки.
            resultMsg.innerHTML = `😞 ПРОИГРЫШ. Выпало ${rolled} (${getDiceSymbol(rolled)}). Ставка на ${betType === 'even' ? 'ЧЁТ' : betType === 'odd' ? 'НЕЧЁТ' : `цифру ${betType}`} не сыграла.`;
        }
        
        // Запускаем следующий авто-бросок через 10 секунд (только если нет активного)
        scheduleAutoRoll();
    }
    
    // Автоматический бросок каждые 10 секунд с рандомной ставкой? 
    // По просьбе "чтобы кубик каждые 10 секунд подкидывался и была анимация этого",
    // мы будем просто кидать кубик для красоты и обновлять историю, но без начисления ставок.
    // Однако если пользователь хочет пассивно смотреть, мы делаем демо-бросок (без ставок),
    // но результат записывается в историю. Для полной азартности, в авто-броске не будет выигрыша,
    // просто анимация и обновление последнего значения, чтобы игрок видел смену чисел.
    async function autoRollOnly() {
        if (isRolling) return;
        const rolled = await rollDiceWithAnimation();
        resultMsg.innerHTML = `🎲 АВТО-БРОСОК! Выпало ${rolled} (${getDiceSymbol(rolled)}). Сделайте ставку фишками!`;
        // просто обновляем историю и всё
    }
    
    function scheduleAutoRoll() {
        if (rollTimeout) clearTimeout(rollTimeout);
        rollTimeout = setTimeout(async () => {
            if (!isRolling) {
                await autoRollOnly();
                scheduleAutoRoll(); // рекурсивный запуск каждые 10 сек
            } else {
                scheduleAutoRoll(); // отложить повторно
            }
        }, 10000);
    }
    
    // Инициализация обработчиков кнопок ставок
    function initBets() {
        const betButtons = document.querySelectorAll('.bet-chip');
        betButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const betType = btn.getAttribute('data-bet');
                placeBet(betType);
            });
        });
    }
    
    // для красоты делаем начальный бросок
    async function firstRoll() {
        await rollDiceWithAnimation();
        resultMsg.innerHTML = '🎲 Игра началась! Ставьте на чет/нечет или число! Каждые 10 сек авто-бросок.';
    }
    
    // Старт
    function startGame() {
        updateBalanceUI();
        initBets();
        firstRoll();
        scheduleAutoRoll();
    }
    
    startGame();
</script>
</body>
</html>
