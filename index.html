<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Casino Slots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }
        
        .balance {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
        
        .slot-machine {
            background: #0f3460;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #e94560;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5), 0 10px 20px rgba(233, 69, 96, 0.3);
            margin-bottom: 15px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            aspect-ratio: 7/5;
        }
        
        .cell {
            background: #1a1a2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            aspect-ratio: 1;
            border: 2px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            transition: all 0.1s ease;
            color: white;
            text-shadow: 0 0 5px currentColor;
        }
        
        .cell.win {
            border-color: gold;
            box-shadow: 0 0 20px gold, 0 0 40px orange;
            transform: scale(1.05);
            z-index: 10;
        }
        
        .cell.spinning {
            animation: spin 0.2s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(10deg) scale(0.9); }
            50% { transform: rotate(0deg) scale(1); }
            75% { transform: rotate(-10deg) scale(0.9); }
            100% { transform: rotate(0deg) scale(1); }
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        
        button {
            flex: 1;
            background: linear-gradient(45deg, #e94560, #0f3460);
            border: none;
            padding: 15px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .win-message {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: gold;
            text-shadow: 0 0 10px orange;
            min-height: 40px;
            margin: 10px 0;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 30px;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="balance">💰 <span id="balance">5000</span></div>
            <div class="stats">🎰 <span id="games">0</span></div>
        </div>
        
        <div class="slot-machine">
            <div class="grid" id="slot-grid"></div>
        </div>
        
        <div class="win-message" id="win-message">⚡ КРУТИ ⚡</div>
        
        <div class="controls">
            <button id="spin-btn">🎰 SPIN (100)</button>
            <button id="reset-btn">🔄 RESET</button>
        </div>
        
        <div class="stats">
            <div>💰 Выигрыш: <span id="totalWin">0</span></div>
            <div>📊 RTP: <span id="rtp">0%</span></div>
            <div id="profit">+0</div>
        </div>
    </div>
    
    <script>
        // Конфигурация
        const CONFIG = {
            ROWS: 5,
            COLS: 7,
            BET: 100,
            INITIAL_BALANCE: 5000,
            
            // ЭМОДЗИ вместо картинок (100% работают в Telegram)
            SYMBOLS: ['🍒', '🍋', '🍊', '🍇', '💎', '7️⃣', '⭐', '🔔', '🎰', '👑'],
            
            // Множители выигрыша (сбалансированные)
            MULTIPLIERS: {
                7: 2,    // 7 одинаковых
                8: 5,    // 8 одинаковых
                9: 10,   // 9 одинаковых
                10: 20,  // 10 одинаковых
                11: 30,  // 11 одинаковых
                12: 50,  // 12 одинаковых
                13: 75,  // 13 одинаковых
                14: 100, // 14+ одинаковых (Джекпот)
                15: 100,
                16: 100,
                17: 100
            }
        };
        
        // Состояние игры
        let gameState = {
            balance: CONFIG.INITIAL_BALANCE,
            gamesPlayed: 0,
            totalWon: 0,
            totalBet: 0,
            grid: []
        };
        
        // Создание сетки
        function createGrid() {
            const grid = document.getElementById('slot-grid');
            grid.innerHTML = '';
            
            for (let i = 0; i < CONFIG.ROWS * CONFIG.COLS; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                cell.textContent = '❓';
                grid.appendChild(cell);
            }
        }
        
        // Получение случайного символа
        function getRandomSymbol() {
            const randomIndex = Math.floor(Math.random() * CONFIG.SYMBOLS.length);
            return CONFIG.SYMBOLS[randomIndex];
        }
        
        // Анимация вращения
        async function spinAnimation() {
            const cells = document.querySelectorAll('.cell');
            const spins = 10;
            
            // Добавляем класс анимации
            cells.forEach(cell => cell.classList.add('spinning'));
            
            // Меняем символы во время анимации
            for (let i = 0; i < spins; i++) {
                await new Promise(resolve => setTimeout(resolve, 50));
                cells.forEach(cell => {
                    cell.textContent = getRandomSymbol();
                });
            }
            
            // Убираем анимацию
            cells.forEach(cell => cell.classList.remove('spinning'));
        }
        
        // Проверка выигрыша
        function checkWin(grid) {
            const counts = {};
            const positions = {};
            
            // Подсчет символов
            for (let row = 0; row < CONFIG.ROWS; row++) {
                for (let col = 0; col < CONFIG.COLS; col++) {
                    const symbol = grid[row][col];
                    counts[symbol] = (counts[symbol] || 0) + 1;
                    
                    if (!positions[symbol]) positions[symbol] = [];
                    positions[symbol].push({row, col});
                }
            }
            
            // Поиск максимальной комбинации
            let maxCount = 0;
            let winSymbol = null;
            
            for (let symbol in counts) {
                if (counts[symbol] >= 7 && counts[symbol] > maxCount) {
                    maxCount = counts[symbol];
                    winSymbol = symbol;
                }
            }
            
            if (maxCount >= 7) {
                const multiplier = CONFIG.MULTIPLIERS[maxCount] || 100;
                const winAmount = CONFIG.BET * multiplier;
                
                // Корректировка RTP (95%)
                if (gameState.gamesPlayed > 0) {
                    const currentRTP = gameState.totalWon / gameState.totalBet;
                    if (currentRTP > 0.95) {
                        return { win: Math.floor(winAmount * 0.7), positions: positions[winSymbol] || [], count: maxCount };
                    }
                }
                
                return { win: winAmount, positions: positions[winSymbol] || [], count: maxCount };
            }
            
            return { win: 0, positions: [], count: 0 };
        }
        
        // Обновление сетки
        function updateGrid(grid, winPositions = []) {
            for (let i = 0; i < CONFIG.ROWS * CONFIG.COLS; i++) {
                const cell = document.getElementById(`cell-${i}`);
                const row = Math.floor(i / CONFIG.COLS);
                const col = i % CONFIG.COLS;
                
                cell.textContent = grid[row][col];
                
                // Подсветка выигрыша
                const isWin = winPositions.some(pos => pos.row === row && pos.col === col);
                if (isWin) {
                    cell.classList.add('win');
                } else {
                    cell.classList.remove('win');
                }
            }
        }
        
        // Основная функция спина
        async function spin() {
            if (gameState.balance < CONFIG.BET) {
                document.getElementById('win-message').textContent = '❌ Не хватает денег!';
                return;
            }
            
            // Блокируем кнопку
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('win-message').textContent = '🎰 ВРАЩЕНИЕ...';
            
            // Анимация
            await spinAnimation();
            
            // Списываем ставку
            gameState.balance -= CONFIG.BET;
            gameState.gamesPlayed++;
            gameState.totalBet += CONFIG.BET;
            
            // Генерируем новую сетку
            const newGrid = [];
            for (let row = 0; row < CONFIG.ROWS; row++) {
                const rowSymbols = [];
                for (let col = 0; col < CONFIG.COLS; col++) {
                    rowSymbols.push(getRandomSymbol());
                }
                newGrid.push(rowSymbols);
            }
            
            // Проверяем выигрыш
            const result = checkWin(newGrid);
            
            // Обновляем сетку
            updateGrid(newGrid, result.positions);
            gameState.grid = newGrid;
            
            // Выплачиваем выигрыш
            if (result.win > 0) {
                gameState.balance += result.win;
                gameState.totalWon += result.win;
                document.getElementById('win-message').innerHTML = `🎉 ВЫИГРЫШ: +${result.win} (${result.count} символов) 🎉`;
            } else {
                document.getElementById('win-message').textContent = '😢 Повезет в следующий раз';
            }
            
            // Обновляем статистику
            updateStats();
            
            // Разблокируем кнопку
            document.getElementById('spin-btn').disabled = false;
        }
        
        // Обновление статистики
        function updateStats() {
            document.getElementById('balance').textContent = gameState.balance;
            document.getElementById('games').textContent = gameState.gamesPlayed;
            document.getElementById('totalWin').textContent = gameState.totalWon;
            
            const rtp = gameState.totalBet > 0 ? ((gameState.totalWon / gameState.totalBet) * 100).toFixed(1) : 0;
            document.getElementById('rtp').textContent = rtp + '%';
            
            const profit = gameState.balance - CONFIG.INITIAL_BALANCE;
            document.getElementById('profit').textContent = (profit >= 0 ? '+' : '') + profit;
            document.getElementById('profit').style.color = profit >= 0 ? '#2ecc71' : '#e74c3c';
        }
        
        // Сброс игры
        function resetGame() {
            gameState = {
                balance: CONFIG.INITIAL_BALANCE,
                gamesPlayed: 0,
                totalWon: 0,
                totalBet: 0,
                grid: []
            };
            
            // Заполняем сетку плейсхолдерами
            const emptyGrid = [];
            for (let row = 0; row < CONFIG.ROWS; row++) {
                emptyGrid.push(Array(CONFIG.COLS).fill('❓'));
            }
            
            updateGrid(emptyGrid, []);
            document.getElementById('win-message').textContent = '⚡ КРУТИ ⚡';
            updateStats();
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            createGrid();
            resetGame();
            
            document.getElementById('spin-btn').addEventListener('click', spin);
            document.getElementById('reset-btn').addEventListener('click', resetGame);
        });
    </script>
</body>
</html>
